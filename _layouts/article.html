---
layout: default
---
<article>
    {% if page.image %}
    <image src={{page.image}} class="article-header"></image>
    {% endif %}
    {% if page.image_attribution %}
    <span>{{ page.image_attribution }}</span>
    {% endif %}
    <h1>{{ page.title }}</h1>
    <span>{{ page.date | date_to_string }} - {{ page.author }}</span>
    {{ content }}
</article>
